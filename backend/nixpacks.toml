[phases.setup]
nixPkgs = ["php82", "php82Extensions.pdo", "php82Extensions.pdo_mysql", "php82Extensions.mbstring", "php82Extensions.xml", "php82Extensions.tokenizer", "php82Extensions.openssl", "php82Extensions.curl", "php82Extensions.zip", "php82Extensions.bcmath", "composer"]

[phases.build]
cmds = ["composer install --no-dev --optimize-autoloader"]

[start]
cmd = "php artisan config:cache && php artisan route:cache && php artisan migrate --force && php artisan passport:install --force && php artisan serve --host=0.0.0.0 --port=$PORT"