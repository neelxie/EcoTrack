[phases.setup]
nixPkgs = [
  "php84",
  "php84Extensions.pdo",
  "php84Extensions.pdo_mysql",
  "php84Extensions.mbstring",
  "php84Extensions.xml",
  "php84Extensions.tokenizer",
  "php84Extensions.openssl",
  "php84Extensions.curl",
  "php84Extensions.zip",
  "php84Extensions.bcmath",
  "php84Extensions.dom",
  "php84Extensions.fileinfo",
  "php84Extensions.ctype",
  "php84Extensions.gd",
  "php84Extensions.intl",
  "php84Extensions.exif",
  "composer"
]

[phases.build]
cmds = ["composer install --no-dev --optimize-autoloader --no-scripts --no-interaction"]

[start]
cmd = "php artisan config:cache && php artisan route:cache && php artisan migrate --force && php artisan passport:install --force && php artisan serve --host=0.0.0.0 --port=$PORT"
